<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE PIT — slambeatsdotkill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Variables & Reset ── */
    :root {
      --bg:      #050102;
      --card:    #0e0508;
      --cborder: rgba(176,16,16,0.22);
      --red:     #b01010;
      --amber:   #e8a020;
      --muted:   #7a6070;
      --sub:     #a08090;
      --text:    #e8dde2;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 14px;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    input, textarea { font-family: inherit; }

    /* ── Layout: header + two-col body ── */
    .pit-shell {
      display: flex; flex-direction: column;
      height: 100dvh; overflow: hidden;
    }

    /* ── Top bar ── */
    .pit-topbar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 14px;
      padding: 10px 20px;
      background: rgba(8,2,4,0.98);
      border-bottom: 2px solid rgba(176,16,16,0.55);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .pit-back {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); border: 1px solid rgba(176,16,16,0.3);
      padding: 6px 12px; border-radius: 6px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .pit-back:hover { color: var(--amber); border-color: var(--amber); }
    .pit-logo {
      height: 32px; width: auto;
    }
    .pit-title {
      font-family: 'Nosifer', cursive;
      font-size: 15px; color: var(--red);
      text-shadow: 0 0 10px rgba(176,16,16,0.8);
      letter-spacing: 2px;
      margin-left: auto;
    }
    .pit-ephemeral-note {
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); margin-left: 10px;
    }

    /* ── Body split ── */
    .pit-body {
      flex: 1; min-height: 0;
      display: flex; overflow: hidden;
    }

    /* ── Album sidebar ── */
    .pit-album {
      flex-shrink: 0;
      width: 280px;
      display: flex; flex-direction: column;
      gap: 0;
      padding: 20px 16px;
      border-right: 1px solid var(--cborder);
      overflow-y: auto;
    }
    .pit-album-box {
      background: var(--card);
      border: 1px solid var(--cborder);
      border-radius: 14px;
      padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .pit-date-label {
      font-family: 'Nosifer', cursive;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: #f0e6d3;
      text-shadow: 0 0 10px rgba(176,16,16,1), 0 2px 6px rgba(0,0,0,0.9);
      text-align: center;
    }
    .pit-artwork-wrap {
      width: 100%; aspect-ratio: 1;
      border-radius: 10px; overflow: hidden;
      background: #1a0a10;
      position: relative;
      cursor: default;
    }
    .pit-artwork-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .pit-artwork-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
    }
    .pit-album-title {
      font-size: 17px; font-weight: 800; line-height: 1.2;
    }
    .pit-album-artist {
      font-size: 13px; color: var(--sub); margin-top: 2px;
    }
    .pit-album-meta {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
    }
    .pit-tag {
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      background: rgba(176,16,16,0.12); border: 1px solid rgba(176,16,16,0.3);
      color: var(--red); padding: 3px 8px; border-radius: 4px;
    }
    .pit-lifetime-note {
      font-size: 10px; color: var(--muted); letter-spacing: 1px;
      text-transform: uppercase; text-align: center;
      border-top: 1px solid var(--cborder); padding-top: 10px;
      line-height: 1.5;
    }
    .pit-lifetime-note span { color: var(--red); }

    /* ── Chat column ── */
    .pit-chat {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .pit-chat-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--cborder);
    }
    .pit-chat-label {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted);
    }
    .pit-online-count {
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted);
    }

    /* Messages */
    .pit-messages {
      flex: 1; min-height: 0;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex; flex-direction: column; gap: 2px;
      scroll-behavior: smooth;
    }
    .pit-messages::-webkit-scrollbar { width: 4px; }
    .pit-messages::-webkit-scrollbar-track { background: transparent; }
    .pit-messages::-webkit-scrollbar-thumb { background: rgba(176,16,16,0.35); border-radius: 4px; }
    .pit-empty {
      text-align: center; color: var(--muted);
      font-size: 12px; padding: 40px 0;
    }
    .pit-msg {
      display: flex; flex-direction: column; gap: 2px;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background 0.1s;
    }
    .pit-msg:hover { background: rgba(255,255,255,0.03); }
    .pit-msg.mine { background: rgba(176,16,16,0.07); }
    .pit-msg.mine:hover { background: rgba(176,16,16,0.1); }
    .pit-msg-header {
      display: flex; align-items: baseline; gap: 8px;
    }
    .pit-msg-user {
      font-size: 12px; font-weight: 700;
      color: var(--amber);
    }
    .pit-msg.mine .pit-msg-user { color: var(--red); }
    .pit-msg-time {
      font-size: 10px; color: var(--muted);
    }
    .pit-msg-delete {
      margin-left: auto; background: none; border: none;
      color: var(--muted); font-size: 11px; opacity: 0.4;
      padding: 0 2px; cursor: pointer;
      transition: opacity 0.15s, color 0.15s;
    }
    .pit-msg-delete:hover { opacity: 1; color: var(--red); }
    .pit-msg-text {
      font-size: 13px; line-height: 1.5; color: var(--text);
      word-break: break-word;
    }

    /* Input bar */
    .pit-input-bar {
      flex-shrink: 0;
      padding: 12px 20px 16px;
      border-top: 1px solid var(--cborder);
      background: rgba(8,2,4,0.95);
    }
    .pit-input-row {
      display: flex; gap: 10px; align-items: flex-end;
    }
    .pit-textarea {
      flex: 1; min-height: 42px; max-height: 100px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--cborder);
      border-radius: 8px; color: var(--text);
      font-size: 13px; padding: 10px 12px;
      resize: none; outline: none;
      transition: border-color 0.15s;
    }
    .pit-textarea:focus { border-color: rgba(176,16,16,0.55); }
    .pit-textarea::placeholder { color: var(--muted); }
    .pit-send-btn {
      background: var(--red); color: #fff;
      border: none; border-radius: 8px;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      font-weight: 700; padding: 0 18px; height: 42px;
      transition: background 0.15s;
    }
    .pit-send-btn:hover { background: #cc1515; }
    .pit-input-meta {
      display: flex; justify-content: space-between;
      margin-top: 5px; padding: 0 2px;
    }
    .pit-char-count { font-size: 10px; color: var(--muted); }
    .pit-filter-error { font-size: 10px; color: var(--red); min-height: 14px; }

    /* Username modal (same as main site) */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(5,1,2,0.88); backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--card); border: 1px solid var(--cborder);
      border-radius: 14px; padding: 28px 24px;
      width: min(380px, 92vw); display: flex; flex-direction: column; gap: 14px;
    }
    .modal-title {
      font-size: 14px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
    }
    .modal-sub { font-size: 12px; color: var(--sub); line-height: 1.5; }
    .modal-input {
      background: rgba(255,255,255,0.05); border: 1px solid var(--cborder);
      border-radius: 8px; color: var(--text); font-size: 14px;
      padding: 10px 12px; outline: none; width: 100%;
      transition: border-color 0.15s;
    }
    .modal-input:focus { border-color: rgba(176,16,16,0.5); }
    .modal-error { font-size: 11px; color: var(--red); min-height: 15px; }
    .modal-btn {
      background: var(--red); color: #fff;
      border: none; border-radius: 8px;
      font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      font-weight: 700; padding: 12px; cursor: pointer;
      transition: background 0.15s;
    }
    .modal-btn:hover { background: #cc1515; }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .pit-album { width: 100%; border-right: none; border-bottom: 1px solid var(--cborder); padding: 14px; flex-shrink: 0; }
      .pit-album-box { flex-direction: row; align-items: flex-start; gap: 12px; }
      .pit-artwork-wrap { width: 90px; flex-shrink: 0; }
      .pit-album-info-col { flex: 1; min-width: 0; }
      .pit-date-label { text-align: left; font-size: 9px; }
      .pit-album-title { font-size: 14px; }
      .pit-lifetime-note { display: none; }
      .pit-body { flex-direction: column; }
      .pit-messages { padding: 10px 12px; }
      .pit-input-bar { padding: 10px 12px 12px; }
    }
  </style>
</head>
<body>

<div class="pit-shell">

  <!-- Top bar -->
  <div class="pit-topbar">
    <a class="pit-back" href="index.html">← KILLING FLOOR</a>
    <img class="pit-logo" src="images/logo.png" alt="slambeatsdotkill" onerror="this.style.display='none'">
    <span class="pit-title">THE PIT</span>
    <span class="pit-ephemeral-note">48hr window</span>
  </div>

  <!-- Body -->
  <div class="pit-body">

    <!-- Album info sidebar -->
    <div class="pit-album">
      <div class="pit-album-box">
        <p class="pit-date-label" id="pit-date"></p>
        <div class="pit-artwork-wrap" id="pit-art-wrap">
          <div class="pit-artwork-placeholder" id="pit-art-placeholder">🎵</div>
          <img id="pit-art-img" style="display:none" alt="Album artwork">
        </div>
        <div class="pit-album-info-col">
          <p class="pit-album-title" id="pit-album-title">—</p>
          <p class="pit-album-artist" id="pit-album-artist">—</p>
          <div class="pit-album-meta">
            <span class="pit-tag" id="pit-genre"></span>
            <span class="pit-tag" id="pit-year"></span>
          </div>
        </div>
        <p class="pit-lifetime-note">
          Comments live for <span>48 hours</span> from posting.<br>
          Ratings are permanent — tied to your profile.
        </p>
      </div>
    </div>

    <!-- Chat column -->
    <div class="pit-chat">
      <div class="pit-chat-header">
        <span class="pit-chat-label">LIVE CHAT</span>
        <span class="pit-online-count" id="pit-msg-count">—</span>
      </div>

      <div class="pit-messages" id="pit-messages">
        <p class="pit-empty">Loading...</p>
      </div>

      <div class="pit-input-bar">
        <div class="pit-input-row">
          <textarea class="pit-textarea" id="pit-textarea"
            placeholder="What do you think of today's album?" maxlength="280" rows="1"></textarea>
          <button class="pit-send-btn" onclick="pitSubmit()">SEND</button>
        </div>
        <div class="pit-input-meta">
          <span class="pit-filter-error" id="pit-filter-err"></span>
          <span class="pit-char-count"><span id="pit-char">280</span> left</span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Username modal -->
<div class="modal-overlay" id="pit-username-modal">
  <div class="modal-box">
    <p class="modal-title">Pick your handle</p>
    <p class="modal-sub">You need a handle to post in the pit. It's permanent — choose well.</p>
    <input class="modal-input" id="pit-handle-input" type="text" maxlength="20"
      placeholder="YourHandle" autocomplete="off" spellcheck="false">
    <p class="modal-error" id="pit-handle-err"></p>
    <button class="modal-btn" onclick="pitSaveHandle()">ENTER THE PIT</button>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────
const SUPABASE_URL = 'https://mfauodrizkxxsvdpuyzq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mYXVvZHJpemt4eHN2ZHB1eXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjU3MTAsImV4cCI6MjA4ODY0MTcxMH0.WlWIc6X5Hggth8JmnqXJPv2KkF6hgYRQWeBOBmdvITs';
const SB_HEADERS = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json'
};

// ── Read URL params ──────────────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
const ALBUM   = params.get('album')  || '';
const ARTIST  = params.get('artist') || '';
const YEAR    = params.get('year')   || '';
const GENRE   = params.get('genre')  || '';
const DATE_KEY = params.get('date') || new Date().toISOString().slice(0, 10);

// ── Helpers ──────────────────────────────────────────────────────
function getUserId() {
    let uid = localStorage.getItem('slambeats_uid');
    if (!uid) {
        uid = 'u_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem('slambeats_uid', uid);
    }
    return uid;
}

function getUsername() {
    return localStorage.getItem('slambeats_username');
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

// ── Word filter ──────────────────────────────────────────────────
const BANNED_WORDS = [
    /\bn[i!1]+[g9]+[e3]*[rz]\b/i,
    /\bn[i!1]+gg[ae]h?\b/i,
    /\bk[i!1]+k[e3]+s?\b/i,
    /\bsp[i!1]+c[k]?\b/i,
    /\bch[i!1]+nk\b/i,
    /\bw[e3]+tb[a@]+ck\b/i,
    /\bg[o0]+[o0]+k\b/i,
    /\bs[a@]+nd\s?n[i!1]+gg[ae]r?\b/i,
    /\bz[i!1]+p\b/i,
    /\bc[o0]+[o0]+n\b/i,
    /\bj[i!1]+gg?[a@b]+[o0]+\b/i,
    /\bbeaner\b/i,
    /\bslant[-\s]?eye\b/i,
    /\bporch\s?monk(ey)?\b/i,
    /\btowel[-\s]?head\b/i,
    /\bh[a@]jji\b/i,
    /\bzip[- ]?head\b/i,
];
function containsBannedWord(t) { return BANNED_WORDS.some(r => r.test(t)); }

// ── Artwork fetch ─────────────────────────────────────────────────
async function fetchArtwork(album, artist) {
    const cacheKey = `slambeats_art_${album}_${artist}`;
    const cached = localStorage.getItem(cacheKey);
    if (cached) return cached;
    const albumL = album.toLowerCase(), artistL = artist.toLowerCase();
    try {
        const q = encodeURIComponent(`${album} ${artist}`);
        const res = await fetch(`https://itunes.apple.com/search?term=${q}&entity=album&limit=10`);
        const data = await res.json();
        if (data.results?.length) {
            const match =
                data.results.find(r => r.collectionName?.toLowerCase() === albumL && r.artistName?.toLowerCase().includes(artistL.split(' ')[0])) ||
                data.results.find(r => r.collectionName?.toLowerCase().includes(albumL) && r.artistName?.toLowerCase().includes(artistL.split(' ')[0]));
            if (match?.artworkUrl100) {
                const url = match.artworkUrl100.replace('100x100bb', '600x600bb');
                localStorage.setItem(cacheKey, url);
                return url;
            }
        }
    } catch(e) {}
    try {
        const mbRes = await fetch(
            `https://musicbrainz.org/ws/2/release-group?query=artist:"${encodeURIComponent(artist)}" AND releasegroup:"${encodeURIComponent(album)}"&fmt=json&limit=5`,
            { headers: { 'User-Agent': 'slambeatsdotkill/1.0 (slambeatsdotkill.com)' } }
        );
        const mbData = await mbRes.json();
        if (mbData['release-groups']?.length) {
            const mbid = mbData['release-groups'][0].id;
            const caaRes = await fetch(`https://coverartarchive.org/release-group/${mbid}/front-500`);
            if (caaRes.ok) { localStorage.setItem(cacheKey, caaRes.url); return caaRes.url; }
        }
    } catch(e) {}
    return null;
}

// ── Comments ──────────────────────────────────────────────────────
let pollTimer = null;

async function loadMessages() {
    try {
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/comments?select=id,user_id,comment,created_at&album_date=eq.${DATE_KEY}&order=created_at.asc`,
            { headers: SB_HEADERS }
        );
        const data = await res.json();

        // Fetch usernames
        const userIds = [...new Set(data.map(c => c.user_id))];
        let uMap = {};
        if (userIds.length > 0) {
            const uRes = await fetch(
                `${SUPABASE_URL}/rest/v1/users?user_id=in.(${userIds.join(',')})&select=user_id,username`,
                { headers: SB_HEADERS }
            );
            const uData = await uRes.json();
            uData.forEach(u => { uMap[u.user_id] = u.username; });
        }

        renderMessages(data, uMap);
    } catch(e) { console.error(e); }
}

function renderMessages(comments, uMap) {
    const el = document.getElementById('pit-messages');
    const countEl = document.getElementById('pit-msg-count');
    const uid = getUserId();
    const isAdmin = getUsername()?.toLowerCase() === 'slambeatsdotkill';

    if (countEl) countEl.textContent = comments.length + ' message' + (comments.length !== 1 ? 's' : '');

    if (!comments.length) {
        el.innerHTML = '<p class="pit-empty">No comments yet — be the first to drop something.</p>';
        return;
    }

    const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;

    el.innerHTML = comments.map(c => {
        const uname  = uMap[c.user_id] || 'unknown';
        const isMe   = c.user_id === uid;
        const time   = formatTime(c.created_at);
        const delBtn = isAdmin
            ? `<button class="pit-msg-delete" onclick="pitDelete('${c.id}','${c.user_id}','${escapeHtml(uname)}',${JSON.stringify(escapeHtml(c.comment))})" title="Delete">✕</button>`
            : (isMe ? `<button class="pit-msg-delete" style="opacity:0.2" title="Your message" disabled>·</button>` : '');
        return `<div class="pit-msg${isMe ? ' mine' : ''}" id="pit-msg-${c.id}">
          <div class="pit-msg-header">
            <span class="pit-msg-user">${escapeHtml(uname)}${isMe ? ' (you)' : ''}</span>
            <span class="pit-msg-time">${time}</span>
            ${delBtn}
          </div>
          <div class="pit-msg-text">${escapeHtml(c.comment)}</div>
        </div>`;
    }).join('');

    if (wasAtBottom) el.scrollTop = el.scrollHeight;
}

async function pitDelete(id, offUid, offUser, commentText) {
    if (!confirm(`Delete this comment by ${offUser}?`)) return;
    try {
        await fetch(`${SUPABASE_URL}/rest/v1/deleted_comments`, {
            method: 'POST', headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
            body: JSON.stringify({ original_comment: commentText, offending_user_id: offUid, offending_username: offUser })
        });
        await fetch(`${SUPABASE_URL}/rest/v1/comments?id=eq.${id}`, { method: 'DELETE', headers: SB_HEADERS });
        document.getElementById(`pit-msg-${id}`)?.remove();
        await loadMessages();
    } catch(e) { console.error(e); }
}

async function pitSubmit() {
    const uname = getUsername();
    if (!uname) { openPitModal(); return; }

    const ta = document.getElementById('pit-textarea');
    const text = ta.value.trim();
    if (!text || text.length < 2) return;

    if (containsBannedWord(text)) {
        const err = document.getElementById('pit-filter-err');
        err.textContent = 'Not on this site.';
        setTimeout(() => err.textContent = '', 3000);
        return;
    }

    ta.disabled = true;
    try {
        await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
            method: 'POST',
            headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
            body: JSON.stringify({ user_id: getUserId(), album_date: DATE_KEY, comment: text })
        });
        ta.value = '';
        document.getElementById('pit-char').textContent = '280';
        await loadMessages();
        const msgs = document.getElementById('pit-messages');
        msgs.scrollTop = msgs.scrollHeight;
    } catch(e) { console.error(e); } finally { ta.disabled = false; ta.focus(); }
}

// ── Username modal ────────────────────────────────────────────────
function openPitModal() {
    document.getElementById('pit-username-modal').classList.add('open');
    document.getElementById('pit-handle-input').focus();
}

async function pitSaveHandle() {
    const val = document.getElementById('pit-handle-input').value.trim();
    const errEl = document.getElementById('pit-handle-err');
    errEl.textContent = '';
    if (!val || val.length < 2) { errEl.textContent = 'Need at least 2 characters.'; return; }
    if (!/^[a-zA-Z0-9_.-]+$/.test(val)) { errEl.textContent = 'Letters, numbers, _ . - only.'; return; }

    try {
        // Check if taken
        const chk = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(val)}&select=user_id`, { headers: SB_HEADERS });
        const existing = await chk.json();
        if (existing.length > 0 && existing[0].user_id !== getUserId()) {
            errEl.textContent = 'Handle taken. Try another.'; return;
        }
        // Save
        await fetch(`${SUPABASE_URL}/rest/v1/users`, {
            method: 'POST',
            headers: { ...SB_HEADERS, 'Prefer': 'return=minimal,resolution=merge-duplicates' },
            body: JSON.stringify({ user_id: getUserId(), username: val })
        });
        localStorage.setItem('slambeats_username', val);
        document.getElementById('pit-username-modal').classList.remove('open');
        pitSubmit();
    } catch(e) { errEl.textContent = 'Error. Try again.'; }
}

// ── Init ──────────────────────────────────────────────────────────
async function pitInit() {
    // Populate album info
    const dateEl = document.getElementById('pit-date');
    if (DATE_KEY) {
        const d = new Date(DATE_KEY + 'T12:00:00');
        dateEl.textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase();
    }
    document.getElementById('pit-album-title').textContent  = ALBUM  || '—';
    document.getElementById('pit-album-artist').textContent = ARTIST || '—';
    document.getElementById('pit-genre').textContent = GENRE || '';
    document.getElementById('pit-year').textContent  = YEAR  || '';

    // Artwork
    if (ALBUM && ARTIST) {
        const artUrl = await fetchArtwork(ALBUM, ARTIST);
        if (artUrl) {
            const img = document.getElementById('pit-art-img');
            img.src = artUrl; img.style.display = 'block';
            document.getElementById('pit-art-placeholder').style.display = 'none';
        }
    }

    // Load messages, then poll every 15 seconds for new ones
    await loadMessages();
    const msgs = document.getElementById('pit-messages');
    msgs.scrollTop = msgs.scrollHeight;
    pollTimer = setInterval(loadMessages, 15000);
}

// ── Textarea char counter + enter-to-send ─────────────────────────
const ta = document.getElementById('pit-textarea');
ta.addEventListener('input', () => {
    document.getElementById('pit-char').textContent = 280 - ta.value.length;
});
ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); pitSubmit(); }
});

pitInit();
</script>
