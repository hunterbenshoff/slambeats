<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>slambeats.kill — The SlamLetter</title>
  <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: 'DeardorfDrip'; src: url('fonts/DeardorfDrip.otf') format('opentype'); font-display: swap; }
    @font-face { font-family: 'Cingire'; src: url('fonts/Cingire.ttf') format('truetype'); font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #c01818; --blood: #b01010; --muted: #8a7060;
      --sub: #c0a890; --card: rgba(28,4,8,0.97);
      --cborder: rgba(180,20,20,0.45); --amber: #d4a840;
    }
    body {
      background-color: #0a0305;
      background-image:
        repeating-linear-gradient(45deg,  rgba(60,5,10,0.18) 0px, rgba(60,5,10,0.18) 2px, transparent 2px, transparent 12px),
        repeating-linear-gradient(-45deg, rgba(60,5,10,0.18) 0px, rgba(60,5,10,0.18) 2px, transparent 2px, transparent 12px);
      color: #f0e6d3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100svh;
    }
    .site-header {
      width: 100%; display: flex; flex-direction: column;
      align-items: flex-start; padding: 0;
      background: url('banner.gif?v=22') center center / cover no-repeat;
      border-top: 3px solid #b01010; border-bottom: 3px solid #b01010;
    }
    .header-logo { display: block; width: min(640px, 85vw); height: auto; margin: 0; }
    .tab-nav {
      position: sticky; top: 0; z-index: 25;
      display: flex; background: rgba(8,2,4,0.98);
      backdrop-filter: blur(8px);
      border-bottom: 2px solid rgba(176,16,16,0.55);
      padding: 0 8px; overflow-x: auto; scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none; border: none; color: var(--muted);
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 13px 12px; cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .tab-btn:hover  { color: var(--amber); }
    .tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }
    .tab-right-cluster { margin-left: auto; display: flex; align-items: center; gap: 10px; padding-right: 4px; }
    .tab-user-btn {
      background: none; border: 1px solid #b01010; color: #e0e0e8;
      font-family: 'Nosifer', cursive; font-size: 11px;
      padding: 4px 10px; cursor: pointer; white-space: nowrap; letter-spacing: 1px;
    }
    .tab-user-btn:hover { background: rgba(176,16,16,0.15); }
    /* Profile card */
    #profile-card {
      position: fixed; top: 0; right: 0; width: 260px;
      background: #0d0d0d; border: 1px solid #b01010; border-top: none;
      z-index: 999; padding: 20px; box-shadow: -4px 4px 20px rgba(0,0,0,0.8);
    }
    .pc-handle { font-family: 'Nosifer', cursive; color: #b01010; font-size: 16px; margin-bottom: 6px; }
    .pc-since  { font-size: 11px; color: #666; margin-bottom: 12px; }
    .pc-stats  { font-size: 12px; color: #999; margin-bottom: 14px; line-height: 1.8; }
    .profile-logout {
      width: 100%; background: transparent; border: 1px solid rgba(180,20,20,0.4);
      color: var(--muted); padding: 8px; font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .profile-logout:hover { border-color: var(--red); color: var(--red); }
    .profile-login-btn {
      width: 100%; background: var(--red); color: #fff; border: none;
      padding: 14px; border-radius: 8px; font-size: 13px;
      font-weight: 800; letter-spacing: 2px; cursor: pointer;
    }
    .profile-login-btn:hover { background: #a01010; }

    /* ── Mobile nav ── */
    .mobile-nav { display: none; }
    @media (max-width: 768px) {
      .tab-nav { display: none; }
      .mobile-nav { display: block; position: sticky; top: 0; z-index: 25; background: rgba(8,2,4,0.98); border-bottom: 2px solid rgba(176,16,16,0.55); }
      .mobile-menu-bar { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 46px; }
      .mobile-active-tab { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--amber); }
      .mobile-right { display: flex; align-items: center; gap: 8px; }
      .mobile-menu-toggle { background: none; border: 1px solid rgba(176,16,16,0.5); color: var(--muted); font-size: 18px; width: 32px; height: 32px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
      .mobile-dropdown { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
      .mobile-dropdown.open { max-height: 400px; }
      .mobile-tab-btn { background: none; border: none; border-bottom: 1px solid rgba(176,16,16,0.2); color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 14px 16px; cursor: pointer; width: 100%; text-align: left; transition: color 0.15s, background 0.15s; }
      .mobile-tab-btn:hover, .mobile-tab-btn.active { color: var(--amber); background: rgba(176,16,16,0.08); }
    }

    /* ── Page content ── */
    .page-content { max-width: 720px; margin: 0 auto; padding: 32px 24px 60px; }
    .issues-header { padding: 8px 0 28px; border-bottom: 1px solid rgba(180,20,20,0.2); margin-bottom: 28px; }
    .issues-title { font-size: 36px; font-weight: 900; letter-spacing: 2px; color: #f0e6d3; text-transform: uppercase; line-height: 1; margin-bottom: 8px; }
    .issues-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
    .newsletter-bar { margin: 0 0 40px; padding: 24px 20px; border: 1px solid rgba(180,20,20,0.25); border-radius: 8px; text-align: center; background: rgba(180,20,20,0.04); }
    .newsletter-label { font-family: 'Nosifer', cursive; font-size: 13px; color: #c00; margin: 0 0 4px; letter-spacing: 2px; }
    .newsletter-sub { font-size: 12px; color: rgba(180,180,200,0.5); margin: 0 0 16px; }
    .newsletter-form { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .newsletter-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #e0e0e8; padding: 9px 14px; font-size: 13px; border-radius: 2px; width: 240px; outline: none; }
    .newsletter-input::placeholder { color: rgba(180,180,200,0.3); }
    .newsletter-btn { background: #c00; color: #fff; border: none; padding: 9px 20px; font-size: 11px; font-weight: 700; letter-spacing: 2px; cursor: pointer; border-radius: 2px; }
    .newsletter-btn:hover { background: #e00; }
    .newsletter-msg { font-size: 11px; margin: 10px 0 0; min-height: 16px; color: rgba(180,180,200,0.6); }
    .issue-card { margin-bottom: 32px; display: flex; gap: 20px; align-items: flex-start; }
    .issue-cover-placeholder { flex-shrink: 0; width: 120px; aspect-ratio: 3/4; background: #0f0406; border: 1px solid rgba(180,20,20,0.2); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .issue-cover-label { font-size: 9px; font-weight: 800; letter-spacing: 3px; color: rgba(180,20,20,0.4); text-transform: uppercase; writing-mode: vertical-rl; }
    .issue-info { flex: 1; padding: 4px 0; }
    .issue-number { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-bottom: 4px; }
    .issue-artist-name { font-size: 22px; font-weight: 900; letter-spacing: 1px; color: #f0e6d3; text-transform: uppercase; margin-bottom: 8px; line-height: 1.1; }
    .issue-desc { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 14px; }
    .issue-status-pill { display: inline-block; font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 3px; background: rgba(180,20,20,0.15); color: var(--red); border: 1px solid rgba(180,20,20,0.3); }
  </style>
</head>
<body>

<header class="site-header">
  <img src="slambeatsdotkill-logo.png?v=2" alt="slambeats.kill" class="header-logo">
</header>

<nav class="tab-nav">
  <button class="tab-btn" onclick="window.location.href='index.html'">The Killing Floor</button>
  <button class="tab-btn active">The SlamLetter</button>
  <button class="tab-btn" onclick="window.location.href='crypt.html'">The Crypt</button>
  <button class="tab-btn" onclick="window.location.href='store.html'">Store</button>
  <div class="tab-right-cluster">
    <button class="tab-user-btn" id="tab-user-btn" onclick="toggleProfileCard()"></button>
  </div>
</nav>

<nav class="mobile-nav">
  <div class="mobile-menu-bar">
    <span class="mobile-active-tab">The SlamLetter</span>
    <div class="mobile-right">
      <button class="tab-user-btn" id="mobile-user-btn" onclick="toggleProfileCard()" style="font-size:10px;padding:4px 8px;"></button>
      <button class="mobile-menu-toggle" onclick="this.closest('.mobile-nav').querySelector('.mobile-dropdown').classList.toggle('open')">☰</button>
    </div>
  </div>
  <div class="mobile-dropdown">
    <button class="mobile-tab-btn" onclick="window.location.href='index.html'">The Killing Floor</button>
    <button class="mobile-tab-btn active">The SlamLetter</button>
    <button class="mobile-tab-btn" onclick="window.location.href='crypt.html'">The Crypt</button>
    <button class="mobile-tab-btn" onclick="window.location.href='store.html'">Store</button>
  </div>
</nav>

<div id="profile-card" style="display:none">
  <div id="profile-card-logged-in" style="display:none">
    <div class="pc-handle" id="pc-handle"></div>
    <div class="pc-since"  id="pc-since"></div>
    <div class="pc-stats"  id="pc-stats"></div>
    <button class="profile-logout" onclick="logoutUser()">LOG OUT</button>
  </div>
  <div id="profile-card-logged-out" style="display:none">
    <button class="profile-login-btn" onclick="window.location.href='index.html'">ENTER THE PIT</button>
  </div>
</div>

<div class="page-content">

  <div class="issues-header">
    <h2 class="issues-title">THE SLAMLETTER</h2>
    <p class="issues-sub">New issues. When they drop, they live here first.</p>
  </div>

  <div class="newsletter-bar">
    <p class="newsletter-label">JOIN THE LIST</p>
    <p class="newsletter-sub">Daily album drops to your inbox. No bullshit.</p>
    <form class="newsletter-form" onsubmit="submitNewsletter(event)">
      <input type="email" id="newsletter-email" class="newsletter-input" placeholder="your@email.com" required />
      <button type="submit" class="newsletter-btn">SUBSCRIBE</button>
    </form>
    <p class="newsletter-msg" id="newsletter-msg"></p>
  </div>

  <div class="issue-card">
    <div class="issue-cover-placeholder">
      <span class="issue-cover-label">Issue 001</span>
    </div>
    <div class="issue-info">
      <p class="issue-number">ISSUE 001</p>
      <p class="issue-artist-name">COMING SEPT 1 2026</p>
      <p class="issue-desc">The first feature. Artist TBA. This is where it starts.</p>
      <div class="issue-status-pill">IN PRODUCTION</div>
    </div>
  </div>

</div>

<script>
function getUsername() { return localStorage.getItem('slambeats_username'); }
function getUserId()   { return localStorage.getItem('slambeats_uid'); }

let profileCardOpen = false;
function toggleProfileCard() {
    profileCardOpen = !profileCardOpen;
    document.getElementById('profile-card').style.display = profileCardOpen ? 'block' : 'none';
    if (profileCardOpen) openProfile();
}
function openProfile() {
    const username = getUsername();
    const uid = getUserId();
    updateUserBtn();
    if (username && uid) {
        document.getElementById('profile-card-logged-in').style.display  = 'block';
        document.getElementById('profile-card-logged-out').style.display = 'none';
        document.getElementById('pc-handle').textContent = username.toUpperCase();
        document.getElementById('pc-since').textContent  = 'Member';
        document.getElementById('pc-stats').textContent  = '';
    } else {
        document.getElementById('profile-card-logged-in').style.display  = 'none';
        document.getElementById('profile-card-logged-out').style.display = 'block';
    }
}
function updateUserBtn() {
    const label = getUsername() ? getUsername().toUpperCase() : 'LOG IN';
    const btn = document.getElementById('tab-user-btn');
    if (btn) btn.textContent = label;
    const mBtn = document.getElementById('mobile-user-btn');
    if (mBtn) mBtn.textContent = label;
}
function logoutUser() {
    localStorage.removeItem('slambeats_uid');
    localStorage.removeItem('slambeats_username');
    profileCardOpen = false;
    document.getElementById('profile-card').style.display = 'none';
    updateUserBtn();
}
document.addEventListener('click', function(e) {
    if (profileCardOpen &&
        !document.getElementById('profile-card').contains(e.target) &&
        !document.getElementById('tab-user-btn').contains(e.target)) {
        profileCardOpen = false;
        document.getElementById('profile-card').style.display = 'none';
    }
});
updateUserBtn();

async function submitNewsletter(e) {
    e.preventDefault();
    const email = document.getElementById('newsletter-email').value.trim();
    const msg   = document.getElementById('newsletter-msg');
    const btn   = e.target.querySelector('.newsletter-btn');
    btn.disabled = true; btn.textContent = '...';
    try {
        await fetch(`https://magic.beehiiv.com/v1/1be33fd6-9f4c-4c49-a460-c7e203641ac1?email=${encodeURIComponent(email)}`, { method: 'GET', mode: 'no-cors' });
        msg.textContent = "You're in. Check your inbox.";
        msg.style.color = '#5f5';
        document.getElementById('newsletter-email').value = '';
    } catch(err) {
        msg.textContent = 'Something went wrong. Try again.';
        msg.style.color = '#f55';
    }
    btn.disabled = false; btn.textContent = 'SUBSCRIBE';
}
</script>
</body>
</html>
