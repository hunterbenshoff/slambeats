<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>slambeats.kill</title>
  <link href="https://fonts.googleapis.com/css2?family=Nosifer&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #e63000;
      --blood:  #cc0000;
      --muted:  #666;
      --sub:    #999;
      --card:   rgba(4,4,12,0.92);
      --cborder: rgba(30,30,60,0.55);
    }

    body {
      background-color: #000000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding-top: 108px;
    }

    /* ── Site header ─────────────────────────────────────────── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 13px 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      background: rgba(2,2,8,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(20,20,50,0.7);
      z-index: 20;
      overflow: visible;
    }

    /* ── Drip wrap (shared for logo + date) ──────────────────── */
    .drip-wrap {
      position: relative;
      display: inline-block;
      flex-shrink: 0;
    }
    .drip-container {
      position: absolute;
      top: 100%; left: 0;
      width: 100%; height: 60px;
      pointer-events: none;
      overflow: visible;
      z-index: 22;
    }
    .drip {
      position: absolute; top: 0;
      background: #990000;
      border-radius: 0 0 50% 50%;
      transform-origin: top center;
      box-shadow: 0 0 4px rgba(140,0,0,0.5);
    }
    @keyframes drip-grow {
      0%   { height: 2px;  opacity: 1; }
      70%  { height: var(--drip-height); opacity: 1; }
      85%  { height: calc(var(--drip-height) + 6px); opacity: 1; }
      100% { height: calc(var(--drip-height) + 4px); opacity: 0; }
    }
    @keyframes drop-fall {
      0%   { transform: translateY(0)    scale(1);   opacity: 1; }
      100% { transform: translateY(28px) scale(0.4); opacity: 0; }
    }

    /* ── Nosifer shared ──────────────────────────────────────── */
    .nosifer-text {
      font-family: 'Nosifer', cursive;
      color: #cc0000;
      text-shadow:
        0 0 10px rgba(180,0,0,0.65),
        0 2px 4px rgba(0,0,0,0.95);
      filter: drop-shadow(0 4px 6px rgba(180,0,0,0.35));
      display: inline-block;
      line-height: 1.2;
    }
    .logo-text { font-size: 22px; letter-spacing: 2px; }
    .date-text  { font-size: 13px; letter-spacing: 1px; text-align: right; }

    /* ── Tab navigation ──────────────────────────────────────── */
    .tab-nav {
      position: fixed;
      top: 57px; left: 0; right: 0;
      z-index: 19;
      display: flex;
      background: rgba(2,2,8,0.97);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(20,20,50,0.6);
      padding: 0 16px;
    }
    .tab-btn {
      background: none; border: none;
      color: var(--muted);
      font-size: 12px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 13px 18px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover  { color: #cc8855; }
    .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

    /* ── Tab panels ──────────────────────────────────────────── */
    .tab-panel { max-width: 540px; margin: 0 auto; padding: 24px 16px 48px; }
    .tab-panel.hidden { display: none; }

    /* ── Album card (today) ──────────────────────────────────── */
    .album-card {
      background: var(--card);
      border: 1px solid var(--cborder);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      backdrop-filter: blur(4px);
    }

    /* ── Artwork ─────────────────────────────────────────────── */
    .artwork-wrap {
      width: 100%; aspect-ratio: 1;
      background: #1a1008; border-radius: 10px;
      overflow: hidden; margin-bottom: 20px; position: relative;
    }
    .artwork-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .artwork-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px;
    }

    /* ── Album info ──────────────────────────────────────────── */
    .album-title  { font-size: 26px; font-weight: 800; line-height: 1.1; margin-bottom: 6px; }
    .album-artist { font-size: 16px; color: var(--sub); margin-bottom: 12px; }
    .album-meta   { display: flex; gap: 8px; align-items: center; margin-bottom: 24px; }
    .tag {
      background: var(--red); color: #fff;
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 3px 9px; border-radius: 3px;
    }
    .year { font-size: 13px; color: var(--muted); }

    /* ── Listen button ───────────────────────────────────────── */
    .listen-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; width: 100%; padding: 16px;
      border-radius: 10px; border: none;
      font-size: 15px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 14px;
    }
    .listen-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .listen-btn:active { transform: translateY(0); }
    .btn-apple   { background: #fc3c44; color: #fff; }
    .btn-spotify { background: #1db954; color: #fff; }
    .btn-youtube { background: #ff0000; color: #fff; }
    .btn-icon { width: 22px; height: 22px; flex-shrink: 0; }

    /* ── Service picker ──────────────────────────────────────── */
    .picker-label {
      font-size: 11px; color: var(--muted); text-align: center;
      margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase;
    }
    .service-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
      margin-bottom: 24px;
    }
    .service-btn {
      background: rgba(4,4,14,0.88);
      border: 1px solid rgba(30,30,60,0.5);
      border-radius: 10px; padding: 14px 8px;
      cursor: pointer; display: flex;
      flex-direction: column; align-items: center; gap: 8px;
      font-size: 11px; color: var(--sub); font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }
    .service-btn:hover { border-color: var(--red); background: rgba(30,4,4,0.95); }
    .service-btn svg { width: 30px; height: 30px; }
    .change-service { text-align: center; margin-top: 6px; }
    .change-service button {
      background: none; border: none; color: var(--muted);
      font-size: 11px; cursor: pointer;
      text-decoration: underline; text-underline-offset: 3px;
    }
    .change-service button:hover { color: var(--sub); }

    /* ── Skull rating ────────────────────────────────────────── */
    .rating-section {
      border-top: 1px solid rgba(30,30,60,0.5);
      padding-top: 20px; margin-top: 8px;
    }
    .rating-label {
      font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px;
    }
    .star-row { display: flex; gap: 4px; margin-bottom: 8px; }
    .star-btn {
      background: none; border: none;
      font-size: 28px; color: #1a1a22;
      cursor: pointer; padding: 0; line-height: 1;
      transition: color 0.12s, transform 0.12s, text-shadow 0.12s;
      filter: drop-shadow(0 0 0px transparent);
    }
    .star-btn:hover      { transform: scale(1.2); }
    .star-btn.lit        {
      color: #7a0000;
      filter: drop-shadow(0 0 4px rgba(180,0,0,0.5));
    }
    .star-btn.saved      {
      color: #cc0000;
      filter: drop-shadow(0 0 6px rgba(200,0,0,0.7));
    }
    .rating-sublabel {
      font-size: 11px; color: var(--muted); min-height: 16px;
    }

    /* ── States ──────────────────────────────────────────────── */
    #view-pick  { display: none; }
    #view-listen { display: none; }

    /* ── Archive panel ───────────────────────────────────────── */
    .panel-heading {
      font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(30,30,60,0.5);
    }
    .archive-entry {
      background: var(--card);
      border: 1px solid var(--cborder);
      border-radius: 10px; padding: 13px 16px;
      margin-bottom: 9px;
      display: flex; gap: 14px; align-items: center;
    }
    .archive-date {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; flex-shrink: 0; min-width: 78px;
    }
    .archive-info { flex: 1; min-width: 0; }
    .archive-title  { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .archive-artist { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .archive-genre  { font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: #880000; margin-top: 3px; }
    .archive-stars  { font-size: 15px; color: #cc0000; flex-shrink: 0; letter-spacing: 2px; filter: drop-shadow(0 0 4px rgba(180,0,0,0.6)); }

    /* ── Ratings panel ───────────────────────────────────────── */
    .ratings-empty {
      text-align: center; color: var(--muted);
      padding: 48px 0; font-size: 13px;
    }
    .rating-entry {
      background: var(--card);
      border: 1px solid var(--cborder);
      border-radius: 10px; padding: 14px 16px;
      margin-bottom: 9px;
      display: flex; gap: 16px; align-items: center;
    }
    .re-stars { font-size: 22px; color: #cc0000; flex-shrink: 0; filter: drop-shadow(0 0 5px rgba(200,0,0,0.65)); }
    .re-info  { flex: 1; min-width: 0; }
    .re-album  { font-size: 14px; font-weight: 700; }
    .re-artist { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .re-meta   { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; }

    /* ── Footer ──────────────────────────────────────────────── */
    .footer {
      text-align: center; font-size: 11px;
      color: rgba(80,80,100,0.35); padding-top: 12px;
    }
  </style>
</head>

    </div>

    <!-- Listen on service -->
    <div id="view-listen">

    <!-- Rating section -->
    <div class="rating-section">

</div>

// HASH + DATE UTILS
// ══════════════════════════════════════════════════════════════
function dateHash(str) {
    let hash = 5381;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) + hash + str.charCodeAt(i)) >>> 0;
    }
    // Finalizer: scrambles bits so consecutive inputs don't produce consecutive outputs
    hash = Math.imul(hash ^ (hash >>> 16), 0x45d9f3b) >>> 0;
    hash = Math.imul(hash ^ (hash >>> 16), 0x45d9f3b) >>> 0;
    return (hash ^ (hash >>> 16)) >>> 0;
}

// Padded date string YYYY-MM-DD — MUST match daily_album.js exactly
function hashStr(d) {
    return padKey(d);
}

// Padded date key for localStorage / display (YYYY-MM-DD)
function padKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getAlbumForDate(d) {
    return ALBUMS[dateHash(hashStr(d)) % ALBUMS.length];
}

function formatDateHeader(d) {
    // Short format for Nosifer header: "Sat Mar 7 2026"
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

// ITUNES ARTWORK
// ══════════════════════════════════════════════════════════════
async function fetchArtwork(album, artist) {
    try {
        const q = encodeURIComponent(`${album} ${artist}`);
        const res = await fetch(`https://itunes.apple.com/search?term=${q}&entity=album&limit=10`);
        const data = await res.json();
        if (data.results && data.results.length > 0) {
            const albumLower = album.toLowerCase();
            const match = data.results.find(r =>
                r.collectionName && r.collectionName.toLowerCase().includes(albumLower.split(' ')[0])
            ) || data.results[0];
            if (match.artworkUrl100) {
                return match.artworkUrl100.replace('100x100bb', '600x600bb');
            }
        }
        // Artist-only fallback
        const res2 = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist)}&entity=album&limit=5`);
        const data2 = await res2.json();
        if (data2.results && data2.results.length > 0) {
            return data2.results[0].artworkUrl100.replace('100x100bb', '600x600bb');
        }
    } catch (e) {}
    return null;
}

// RATING SYSTEM
// ══════════════════════════════════════════════════════════════
const RATING_PREFIX = 'slambeats_rating_';
const RATING_DESCS  = ['', 'Not for me', 'Decent', 'Solid', 'Great', 'All-time classic'];

function saveRating(val) {
    localStorage.setItem(RATING_PREFIX + padKey(new Date()), String(val));
}

function getRatingForDate(d) {
    return localStorage.getItem(RATING_PREFIX + padKey(d));
}

function applyStarState(rating) {
    const r = parseInt(rating) || 0;
    document.querySelectorAll('.star-btn').forEach(s => {
        const v = parseInt(s.dataset.val);
        s.classList.toggle('saved', r > 0 && v <= r);
        s.classList.remove('lit');
    });
    const label = document.getElementById('rating-sublabel');
    label.textContent = r ? `${RATING_DESCS[r]}  (${r}/5)  ·  saved ✓` : '';
}

function setRating(val) {
    saveRating(val);
    applyStarState(val);
    // Refresh other panels if they're already built
    if (!document.getElementById('panel-archive').classList.contains('hidden')) buildArchivePanel();
    if (!document.getElementById('panel-ratings').classList.contains('hidden')) buildRatingsPanel();
}

function initStarHover() {
    const stars = document.querySelectorAll('.star-btn');
    stars.forEach(s => {
        s.addEventListener('mouseenter', () => {
            const v = parseInt(s.dataset.val);
            stars.forEach(ss => ss.classList.toggle('lit', parseInt(ss.dataset.val) <= v));
        });
        s.addEventListener('mouseleave', () => {
            stars.forEach(ss => ss.classList.remove('lit'));
            applyStarState(getRatingForDate(new Date()));
        });
    });
}

    today.setHours(0, 0, 0, 0);

    const entries = [];
    for (let d = new Date(today); d >= ARCHIVE_START; d.setDate(d.getDate() - 1)) {
        const dd = new Date(d);
        dd.setHours(12, 0, 0, 0);
        if (dd.getTime() >= today.getTime()) continue; // skip today (shown in Today tab)

        const [album, artist, year, genre] = getAlbumForDate(dd);
        const rating = getRatingForDate(dd);
        const dateStr = dd.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

        entries.push({ dateStr, album, artist, year, genre, rating });
    }

    if (entries.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);padding:32px 0;text-align:center;font-size:13px">No previous albums yet.<br>Come back tomorrow!</p>';
        document.getElementById('archive-heading').textContent = 'Previous Albums';
        return;
    }

    document.getElementById('archive-heading').textContent = `Previous Albums  ·  ${entries.length} days`;

    list.innerHTML = entries.map(e => {
        const stars = e.rating ? '★'.repeat(parseInt(e.rating)) : '';
        return `
          <div class="archive-entry">
            <div class="archive-date">${e.dateStr}</div>
            <div class="archive-info">
              <div class="archive-title">${e.album}</div>
              <div class="archive-artist">${e.artist}  ·  ${e.year}</div>
              <div class="archive-genre">${e.genre}</div>
            </div>
            ${stars ? `<div class="archive-stars">${stars}</div>` : ''}
          </div>`;
    }).join('');
}

// ══════════════════════════════════════════════════════════════
// RATINGS PANEL
// ══════════════════════════════════════════════════════════════
function buildRatingsPanel() {
    const list = document.getElementById('ratings-list');
    const ratings = [];

    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key || !key.startsWith(RATING_PREFIX)) continue;
        const dk = key.replace(RATING_PREFIX, '');
        const val = parseInt(localStorage.getItem(key));
        if (!val || val < 1 || val > 5) continue;

        // Reconstruct date from YYYY-MM-DD key
        const parts = dk.split('-');
        if (parts.length !== 3) continue;
        const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]), 12);
        const [album, artist, year, genre] = getAlbumForDate(d);
        const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

        ratings.push({ dk, dateStr, album, artist, year, genre, val });
    }

    if (ratings.length === 0) {
        list.innerHTML = '<p class="ratings-empty">No ratings yet.<br>Rate today\'s album to get started!</p>';
        return;
    }

    ratings.sort((a, b) => b.dk.localeCompare(a.dk));

    list.innerHTML = ratings.map(r => `
      <div class="rating-entry">
        <div class="re-stars">${r.val}★</div>
        <div class="re-info">
          <div class="re-album">${r.album}</div>
          <div class="re-artist">${r.artist}  ·  ${r.year}</div>
          <div class="re-meta">${r.dateStr}  ·  ${RATING_DESCS[r.val]}</div>
        </div>
      </div>`).join('');
}

// ══════════════════════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════════════════════
function switchTab(name) {
    ['today', 'archive', 'ratings'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== name);
        document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
    });
    if (name === 'archive') buildArchivePanel();
    if (name === 'ratings') buildRatingsPanel();
}

// ══════════════════════════════════════════════════════════════
// SERVICE SELECTION
// ══════════════════════════════════════════════════════════════
function pickService(serviceKey) {
    localStorage.setItem('dailyalbum_service', serviceKey);
    const [album, artist] = getAlbumForDate(new Date());
    showListenView(serviceKey, album, artist);
    window.open(SERVICES[serviceKey].url(album, artist), '_blank');
}

function showListenView(serviceKey, album, artist) {
    const svc = SERVICES[serviceKey];
    document.getElementById('view-pick').style.display   = 'none';
    document.getElementById('view-listen').style.display = 'block';
    const btn = document.getElementById('listen-link');
    btn.href = svc.url(album, artist);
    btn.className = `listen-btn btn-${serviceKey}`;
    document.getElementById('btn-icon').innerHTML = svc.icon;
    document.getElementById('btn-label').textContent = `Listen on ${svc.name}`;
}

function resetService() {
    localStorage.removeItem('dailyalbum_service');
    document.getElementById('view-listen').style.display = 'none';
    document.getElementById('view-pick').style.display   = 'block';
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
async function init() {
    const today = new Date();
    const [album, artist, year, genre] = getAlbumForDate(today);

    // Header date
    document.getElementById('date-display').textContent = formatDateHeader(today);

    // Album info
    document.getElementById('album-title').textContent  = album;
    document.getElementById('album-artist').textContent = artist;
    document.getElementById('album-genre').textContent  = genre;
    document.getElementById('album-year').textContent   = year;

    // Artwork
    const artUrl = await fetchArtwork(album, artist);
    if (artUrl) {
        const img = document.getElementById('artwork-img');
        img.src = artUrl;
        img.style.display = 'block';
        document.getElementById('artwork-placeholder').style.display = 'none';
    }

    // Service
    const saved = localStorage.getItem('dailyalbum_service');
    if (saved && SERVICES[saved]) {
        showListenView(saved, album, artist);
    } else {
        document.getElementById('view-pick').style.display = 'block';
    }

    // Rating
    const savedRating = getRatingForDate(today);
    if (savedRating) applyStarState(parseInt(savedRating));
    initStarHover();
}

init();

// ══════════════════════════════════════════════════════════════
// BLOOD DRIP ANIMATION
// ══════════════════════════════════════════════════════════════
function spawnDrip(containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;

    const drip = document.createElement('div');
    drip.className = 'drip';

    const leftPct  = 5 + Math.random() * 90;
    const width    = 3 + Math.random() * 5;
    const height   = 12 + Math.random() * 30;
    const duration = 1200 + Math.random() * 1600;

    drip.style.left  = leftPct + '%';
    drip.style.width = width + 'px';
    drip.style.setProperty('--drip-height', height + 'px');
    drip.style.animation = `drip-grow ${duration}ms ease-in forwards`;

    container.appendChild(drip);

    setTimeout(() => {
        const drop = document.createElement('div');
        drop.style.cssText = `
            position:absolute; left:${leftPct}%; top:${height}px;
            width:${width + 3}px; height:${width + 3}px;
            background:#cc0000; border-radius:50%;
            box-shadow:0 0 4px rgba(140,0,0,0.5);
            animation:drop-fall 400ms ease-in forwards;
        `;
        container.appendChild(drop);
        setTimeout(() => drop.remove(), 450);
        setTimeout(() => drip.remove(), 200);
    }, duration * 0.82);
}

(function initDrips() {
    for (let i = 0; i < 5; i++) setTimeout(() => spawnDrip('logo-drip-container'), i * 280);
    setInterval(() => spawnDrip('logo-drip-container'), 500);
    for (let i = 0; i < 3; i++) setTimeout(() => spawnDrip('date-drip-container'), 150 + i * 420);
    setInterval(() => spawnDrip('date-drip-container'), 680);
})();

</script>
