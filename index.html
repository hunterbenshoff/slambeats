<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>slambeats.kill</title>
  <link href="https://fonts.googleapis.com/css2?family=Nosifer&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'DeardorfDrip';
      src: url('fonts/DeardorfDrip.otf') format('opentype');
      font-display: swap;
    }
    @font-face {
      font-family: 'Cingire';
      src: url('fonts/Cingire.ttf') format('truetype');
      font-display: swap;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #e63000;
      --blood:  #cc0000;
      --muted:  #666;
      --sub:    #999;
      --card:   rgba(4,4,12,0.92);
      --cborder: rgba(30,30,60,0.55);
    }

    body {
      background-color: #000000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding-top: 108px;
    }

    /* ── Site header ─────────────────────────────────────────── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 13px 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      background: rgba(2,2,8,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(20,20,50,0.7);
      z-index: 20;
      overflow: visible;
    }

    /* ── Drip wrap (shared for logo + date) ──────────────────── */
    .drip-wrap {
      position: relative;
      display: inline-block;
      flex-shrink: 0;
    }
    .drip-container {
      position: absolute;
      top: 100%; left: 0;
      width: 100%; height: 60px;
      pointer-events: none;
      overflow: visible;
      z-index: 22;
    }
    /* drip shapes are now SVG — no CSS needed for .drip */

    /* ── Nosifer shared ──────────────────────────────────────── */
    .nosifer-text {
      font-family: 'Nosifer', cursive;
      color: #cc0000;
      text-shadow:
        0 0 10px rgba(180,0,0,0.65),
        0 2px 4px rgba(0,0,0,0.95);
      filter: drop-shadow(0 4px 6px rgba(180,0,0,0.35));
      display: inline-block;
      line-height: 1.2;
    }
    .logo-text {
      font-family: 'DeardorfDrip', 'Nosifer', cursive;
      font-size: 28px;
      letter-spacing: 3px;
      position: relative;
    }
    .logo-text::before {
      content: 'slambeats.kill';
      font-family: 'Cingire', cursive;
      position: absolute;
      top: 4px; left: 4px;
      color: #440000;
      opacity: 0.6;
      z-index: -1;
      text-shadow: none;
      filter: none;
    }
    .date-text  { font-size: 13px; letter-spacing: 1px; text-align: right; }
    @media (max-width: 500px) {
      .date-text, #date-drip-container { display: none; }
    }

    /* ── Tab navigation ──────────────────────────────────────── */
    .tab-nav {
      position: fixed;
      top: 57px; left: 0; right: 0;
      z-index: 19;
      display: flex;
      background: rgba(2,2,8,0.97);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(20,20,50,0.6);
      padding: 0 16px;
    }
    .tab-btn {
      background: none; border: none;
      color: var(--muted);
      font-size: 12px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 13px 18px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover  { color: #cc8855; }
    .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

    /* ── Tab panels ──────────────────────────────────────────── */
    .tab-panel { max-width: 540px; margin: 0 auto; padding: 24px 16px 48px; }
    .tab-panel.hidden { display: none; }

    /* ── Album card (today) ──────────────────────────────────── */
    .album-card {
      background: var(--card);
      border: 1px solid var(--cborder);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      backdrop-filter: blur(4px);
    }

    /* ── Artwork ─────────────────────────────────────────────── */
    .artwork-wrap {
      width: 100%; aspect-ratio: 1;
      background: #1a1008; border-radius: 10px;
      overflow: hidden; margin-bottom: 20px; position: relative;
    }
    .artwork-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .artwork-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px;
    }

    /* ── Album info ──────────────────────────────────────────── */
    .album-title  { font-size: 26px; font-weight: 800; line-height: 1.1; margin-bottom: 6px; }
    .album-artist { font-size: 16px; color: var(--sub); margin-bottom: 12px; }
    .album-meta   { display: flex; gap: 8px; align-items: center; margin-bottom: 24px; }
    .tag {
      background: var(--red); color: #fff;
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 3px 9px; border-radius: 3px;
    }
    .year { font-size: 13px; color: var(--muted); }

    /* ── Listen button ───────────────────────────────────────── */
    .listen-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; width: 100%; padding: 16px;
      border-radius: 10px; border: none;
      font-size: 15px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 14px;
    }
    .listen-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .listen-btn:active { transform: translateY(0); }
    .btn-apple   { background: #fc3c44; color: #fff; }
    .btn-spotify { background: #1db954; color: #fff; }
    .btn-youtube { background: #ff0000; color: #fff; }
    .btn-icon { width: 22px; height: 22px; flex-shrink: 0; }

    /* ── Service picker ──────────────────────────────────────── */
    .picker-label {
      font-size: 11px; color: var(--muted); text-align: center;
      margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase;
    }
    .service-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
      margin-bottom: 24px;
    }
    .service-btn {
      background: rgba(4,4,14,0.88);
      border: 1px solid rgba(30,30,60,0.5);
      border-radius: 10px; padding: 14px 8px;
      cursor: pointer; display: flex;
      flex-direction: column; align-items: center; gap: 8px;
      font-size: 11px; color: var(--sub); font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }
    .service-btn:hover { border-color: var(--red); background: rgba(30,4,4,0.95); }
    .service-btn svg { width: 30px; height: 30px; }
    .change-service { text-align: center; margin-top: 6px; }
    .change-service button {
      background: none; border: none; color: var(--muted);
      font-size: 11px; cursor: pointer;
      text-decoration: underline; text-underline-offset: 3px;
    }
    .change-service button:hover { color: var(--sub); }

    /* ── Skull rating ────────────────────────────────────────── */
    .rating-section {
      border-top: 1px solid rgba(30,30,60,0.5);
      padding-top: 20px; margin-top: 8px;
    }
    .rating-label {
      font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px;
    }
    .star-row { display: flex; gap: 4px; margin-bottom: 8px; }
    .star-btn {
      background: none; border: none;
      font-size: 28px; color: #1a1a22;
      cursor: pointer; padding: 0; line-height: 1;
      transition: color 0.12s, transform 0.12s, text-shadow 0.12s;
      filter: drop-shadow(0 0 0px transparent);
    }
    .star-btn:hover      { transform: scale(1.2); }
    .star-btn.lit        {
      color: #7a0000;
      filter: drop-shadow(0 0 4px rgba(180,0,0,0.5));
    }
    .star-btn.saved      {
      color: #cc0000;
      filter: drop-shadow(0 0 6px rgba(200,0,0,0.7));
    }
    .rating-sublabel {
      font-size: 11px; color: var(--muted); min-height: 16px;
    }
    .community-rating {
      margin-top: 14px; display: none; text-align: center;
    }
    .cr-skulls { color: #cc0000; font-size: 16px; filter: drop-shadow(0 0 4px rgba(200,0,0,0.6)); letter-spacing: 2px; }
    .cr-text   { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; margin-left: 6px; }
    .dist-row  { display:flex; height:4px; border-radius:2px; overflow:hidden; margin-top:6px; gap:1px; }
    .dist-bar  { height:100%; border-radius:1px; min-width:2px; }

    /* ── States ──────────────────────────────────────────────── */
    #view-pick  { display: none; }
    #view-listen { display: none; }

    /* ── Archive panel ───────────────────────────────────────── */
    .panel-heading {
      font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(30,30,60,0.5);
    }
    .archive-entry {
      background: var(--card);
      border: 1px solid var(--cborder);
      border-radius: 10px; padding: 13px 16px;
      margin-bottom: 9px;
      display: flex; gap: 14px; align-items: center;
    }
    .archive-date {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; flex-shrink: 0; min-width: 78px;
    }
    .archive-info { flex: 1; min-width: 0; }
    .archive-title  { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .archive-artist { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .archive-genre  { font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: #880000; margin-top: 3px; }
    .archive-stars  { font-size: 15px; color: #cc0000; flex-shrink: 0; letter-spacing: 2px; filter: drop-shadow(0 0 4px rgba(180,0,0,0.6)); }
    .archive-listen { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .arch-listen-btn {
      font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
      padding: 3px 9px; border-radius: 4px;
      text-decoration: none; border: 1px solid transparent;
      transition: opacity 0.15s, transform 0.1s;
      opacity: 0.7;
    }
    .arch-listen-btn:hover { opacity: 1; transform: translateY(-1px); }
    .arch-apple   { background: rgba(252,60,68,0.12); color: #fc3c44; border-color: rgba(252,60,68,0.25); }
    .arch-spotify { background: rgba(29,185,84,0.10); color: #1db954; border-color: rgba(29,185,84,0.22); }
    .arch-youtube { background: rgba(255,0,0,0.09);  color: #ff5555; border-color: rgba(255,80,80,0.2); }

    /* ── Ratings panel ───────────────────────────────────────── */
    .ratings-empty {
      text-align: center; color: var(--muted);
      padding: 48px 0; font-size: 13px;
    }
    .rating-entry {
      background: var(--card);
      border: 1px solid var(--cborder);
      border-radius: 10px; padding: 14px 16px;
      margin-bottom: 9px;
      display: flex; gap: 16px; align-items: center;
    }
    .re-stars { font-size: 22px; color: #cc0000; flex-shrink: 0; filter: drop-shadow(0 0 5px rgba(200,0,0,0.65)); }
    .re-info  { flex: 1; min-width: 0; }
    .re-album  { font-size: 14px; font-weight: 700; }
    .re-artist { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .re-meta   { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; }
    .indiv-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .indiv-rating {
      font-size: 11px; color: #cc0000;
      background: rgba(200,0,0,0.07);
      border: 1px solid rgba(200,0,0,0.15);
      border-radius: 4px; padding: 2px 7px;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .indiv-rating.mine {
      border-color: rgba(200,0,0,0.45);
      background: rgba(200,0,0,0.16);
    }
    .mine-tag {
      font-size: 9px; color: rgba(220,120,120,0.8);
      letter-spacing: 0.5px; text-transform: uppercase;
      font-family: sans-serif;
    }

    /* ── Footer ──────────────────────────────────────────────── */
    .footer {
      text-align: center; font-size: 11px;
      color: rgba(80,80,100,0.35); padding-top: 12px;
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="site-header">
  <div class="drip-wrap">
    <span class="nosifer-text logo-text">slambeats.kill</span>
    <div class="drip-container" id="logo-drip-container"></div>
  </div>
  <div class="drip-wrap">
    <span class="nosifer-text date-text" id="date-display"></span>
    <div class="drip-container" id="date-drip-container"></div>
  </div>
</header>

<!-- ── Tab Nav ── -->
<nav class="tab-nav">
  <button class="tab-btn active" id="tab-today"   onclick="switchTab('today')">Today</button>
  <button class="tab-btn"        id="tab-archive" onclick="switchTab('archive')">Archive</button>
  <button class="tab-btn"        id="tab-ratings" onclick="switchTab('ratings')">Ratings</button>
</nav>

<!-- ════════════════ TODAY PANEL ════════════════ -->
<div class="tab-panel" id="panel-today">
  <div class="album-card">

    <!-- Artwork -->
    <div class="artwork-wrap">
      <div class="artwork-placeholder" id="artwork-placeholder">🎵</div>
      <img id="artwork-img" style="display:none" alt="Album artwork">
    </div>

    <!-- Info -->
    <h1 class="album-title"  id="album-title"></h1>

    <div class="album-meta">
      <span class="tag"  id="album-genre"></span>
      <span class="year" id="album-year"></span>
    </div>

    <!-- Pick service -->
    <div id="view-pick">
      <p class="picker-label">Where do you listen?</p>
      <div class="service-grid">

        <button class="service-btn" onclick="pickService('apple')">
          <svg viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="7" fill="#fc3c44"/>
            <path d="M21.5 9.5H13v10.25c-.42-.17-.88-.25-1.5-.25-1.93 0-3.5 1.34-3.5 3s1.57 3 3.5 3 3.5-1.34 3.5-3V12.5h5V9.5z" fill="#fff"/>
          </svg>
          Apple Music
        </button>

        <button class="service-btn" onclick="pickService('spotify')">
          <svg viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="16" fill="#1db954"/>
            <path d="M22.5 17.5c-3.5-2-8.5-2.5-12-1.5-.5.2-1-.1-1.2-.6-.2-.5.1-1 .6-1.2 4-.9 9.5-.4 13.2 1.7.5.3.6.9.3 1.4-.3.4-.9.5-1.4.2zm-.8 3c-.3.4-.8.5-1.2.3-2.9-1.7-7.2-2.2-10.6-1.2-.4.1-.9-.1-1-.5-.1-.4.1-.9.5-1 3.8-1.1 8.5-.6 11.8 1.3.4.3.5.8.3 1.2zm-1.2 2.8c-.2.3-.6.4-1 .2-2.5-1.5-5.6-1.9-9.3-1-.3.1-.7-.1-.8-.5-.1-.3.1-.7.5-.8 4-.9 7.5-.5 10.3 1.2.4.2.5.6.3.9z" fill="#fff"/>
          </svg>
          Spotify
        </button>

        <button class="service-btn" onclick="pickService('youtube')">
          <svg viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="16" fill="#ff0000"/>
            <circle cx="16" cy="16" r="7" fill="#fff"/>
            <circle cx="16" cy="16" r="4" fill="#ff0000"/>
            <path d="M14 13.5l5 2.5-5 2.5V13.5z" fill="#fff"/>
          </svg>
          YouTube Music
        </button>

      </div>
    </div>

    <!-- Listen on service -->
    <div id="view-listen">
      <a id="listen-link" class="listen-btn" target="_blank" rel="noopener">
        <svg class="btn-icon" id="btn-icon" viewBox="0 0 24 24" fill="currentColor"></svg>
        <span id="btn-label">Listen Now</span>
      </a>
      <div class="change-service">
        <button onclick="resetService()">Change streaming service</button>
      </div>
    </div>

    <!-- Rating section -->
    <div class="rating-section">
      <p class="rating-label">Rate Today's Album</p>
      <div class="star-row" id="star-row">
        <button class="star-btn" data-val="1" onclick="setRating(1)">☠</button>
        <button class="star-btn" data-val="2" onclick="setRating(2)">☠</button>
        <button class="star-btn" data-val="3" onclick="setRating(3)">☠</button>
        <button class="star-btn" data-val="4" onclick="setRating(4)">☠</button>
        <button class="star-btn" data-val="5" onclick="setRating(5)">☠</button>
      </div>
      <p class="rating-sublabel" id="rating-sublabel"></p>
      <div class="community-rating" id="community-rating"></div>
    </div>

  </div><!-- /album-card -->
  <p class="footer">Metal Today. Metal Tomorrow. Metal Forever.</p>
</div>

<!-- ════════════════ ARCHIVE PANEL ════════════════ -->
<div class="tab-panel hidden" id="panel-archive">
  <p class="panel-heading" id="archive-heading">Previous Albums</p>
  <div id="archive-list"></div>
</div>

<!-- ════════════════ RATINGS PANEL ════════════════ -->
<div class="tab-panel hidden" id="panel-ratings">
  <p class="panel-heading">Community Ratings</p>
  <div id="ratings-list"></div>
</div>

// HASH + DATE UTILS
// ══════════════════════════════════════════════════════════════
function dateHash(str) {
    let hash = 5381;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) + hash + str.charCodeAt(i)) >>> 0;
    }
    // Finalizer: scrambles bits so consecutive inputs don't produce consecutive outputs
    hash = Math.imul(hash ^ (hash >>> 16), 0x45d9f3b) >>> 0;
    hash = Math.imul(hash ^ (hash >>> 16), 0x45d9f3b) >>> 0;
    return (hash ^ (hash >>> 16)) >>> 0;
}

// Padded date string YYYY-MM-DD — MUST match daily_album.js exactly
function hashStr(d) {
    return padKey(d);
}

// Padded date key for localStorage / display (YYYY-MM-DD)
function padKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getAlbumForDate(d) {
    return ALBUMS[dateHash(hashStr(d)) % ALBUMS.length];
}

function formatDateHeader(d) {
    // Short format for Nosifer header: "Sat Mar 7 2026"
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

// ITUNES ARTWORK
// ══════════════════════════════════════════════════════════════
async function fetchArtwork(album, artist) {
    try {
        const q = encodeURIComponent(`${album} ${artist}`);
        const res = await fetch(`https://itunes.apple.com/search?term=${q}&entity=album&limit=10`);
        const data = await res.json();
        if (data.results && data.results.length > 0) {
            const albumLower = album.toLowerCase();
            const match = data.results.find(r =>
                r.collectionName && r.collectionName.toLowerCase().includes(albumLower.split(' ')[0])
            ) || data.results[0];
            if (match.artworkUrl100) {
                return match.artworkUrl100.replace('100x100bb', '600x600bb');
            }
        }
        // Artist-only fallback
        const res2 = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist)}&entity=album&limit=5`);
        const data2 = await res2.json();
        if (data2.results && data2.results.length > 0) {
            return data2.results[0].artworkUrl100.replace('100x100bb', '600x600bb');
        }
    } catch (e) {}
    return null;
}

// ══════════════════════════════════════════════════════════════
// RATING SYSTEM
// ══════════════════════════════════════════════════════════════
const RATING_PREFIX = 'slambeats_rating_';
const RATING_DESCS  = ['', 'Suicide Soundtrack', 'MedioCORE', 'Juicy', 'Daily Driver', 'Lemmy'];

function getUserId() {
    let uid = localStorage.getItem('slambeats_uid');
    if (!uid) {
        uid = (typeof crypto !== 'undefined' && crypto.randomUUID)
            ? crypto.randomUUID()
            : Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem('slambeats_uid', uid);
    }
    return uid;
}

let ratingsCache = null; // { 'YYYY-MM-DD': { avg, count, ratings:[{rating,user_id}], album, artist } }

async function fetchAllRatings(forceRefresh = false) {
    if (ratingsCache && !forceRefresh) return ratingsCache;
    try {
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/ratings?select=date,album,artist,rating,user_id&order=date.desc`,
            { headers: SB_HEADERS }
        );
        const data = await res.json();
        const cache = {};
        data.forEach(r => {
            if (!cache[r.date]) cache[r.date] = { ratings: [], avg: 0, count: 0, album: r.album, artist: r.artist };
            cache[r.date].ratings.push({ rating: r.rating, user_id: r.user_id });
        });
        Object.keys(cache).forEach(dk => {
            const vals = cache[dk].ratings.map(r => r.rating);
            cache[dk].count = vals.length;
            cache[dk].avg   = vals.reduce((s, v) => s + v, 0) / vals.length;
        });
        ratingsCache = cache;
        return cache;
    } catch(e) { return {}; }
}

function getRatingForDate(d) {
    return localStorage.getItem(RATING_PREFIX + padKey(d));
}

function applyStarState(rating) {
    const r = parseInt(rating) || 0;
    document.querySelectorAll('.star-btn').forEach(s => {
        const v = parseInt(s.dataset.val);
        s.classList.toggle('saved', r > 0 && v <= r);
        s.classList.remove('lit');
    });
    const label = document.getElementById('rating-sublabel');
    label.textContent = r ? `${RATING_DESCS[r]}  (${r}/5)  ·  saved ✓` : '';
}

async function loadCommunityRating() {
    const dk  = padKey(new Date());
    const cache = await fetchAllRatings(true);
    const uid = getUserId();
    const el  = document.getElementById('community-rating');
    if (!el) return;
    const d = cache[dk];
    if (d && d.count > 0) {
        const skulls = '☠'.repeat(Math.round(d.avg));
        const others = d.ratings.filter(r => r.user_id !== uid).length;
        const countLabel = others > 0
            ? `${d.avg.toFixed(1)}/5 · ${d.count} rating${d.count > 1 ? 's' : ''} today`
            : `Your rating · ${d.avg.toFixed(1)}/5`;
        el.innerHTML = `<span class="cr-skulls">${skulls}</span><span class="cr-text">${countLabel}</span>`;
        el.style.display = 'block';
    } else {
        el.style.display = 'none';
    }
}

async function setRating(val) {
    // Save locally so it persists across refreshes for this browser
    localStorage.setItem(RATING_PREFIX + padKey(new Date()), String(val));
    applyStarState(val);
    // Upsert to Supabase — unique on (date, user_id) so changing rating replaces, not adds
    try {
        const today = new Date();
        const [album, artist] = getAlbumForDate(today);
        const uid = getUserId();
        await fetch(`${SUPABASE_URL}/rest/v1/ratings`, {
            method: 'POST',
            headers: { ...SB_HEADERS, 'Prefer': 'return=minimal,resolution=merge-duplicates' },
            body: JSON.stringify({ date: padKey(today), album, artist, rating: val, user_id: uid })
        });
        ratingsCache = null;
        await loadCommunityRating();
    } catch(e) {}
    if (!document.getElementById('panel-archive').classList.contains('hidden')) buildArchivePanel();
    if (!document.getElementById('panel-ratings').classList.contains('hidden')) buildRatingsPanel();
}

function initStarHover() {
    const stars = document.querySelectorAll('.star-btn');
    stars.forEach(s => {
        s.addEventListener('mouseenter', () => {
            const v = parseInt(s.dataset.val);
            stars.forEach(ss => ss.classList.toggle('lit', parseInt(ss.dataset.val) <= v));
        });
        s.addEventListener('mouseleave', () => {
            stars.forEach(ss => ss.classList.remove('lit'));
            applyStarState(getRatingForDate(new Date()));
        });
    });
}

// ══════════════════════════════════════════════════════════════
// ARCHIVE PANEL
// ══════════════════════════════════════════════════════════════
const ARCHIVE_START = new Date('2026-03-01T12:00:00');

async function buildArchivePanel() {
    const list  = document.getElementById('archive-list');
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const ratingsData = await fetchAllRatings();
    const entries = [];

    for (let d = new Date(today); d >= ARCHIVE_START; d.setDate(d.getDate() - 1)) {
        const dd = new Date(d);
        dd.setHours(12, 0, 0, 0);
        if (dd.getTime() >= today.getTime()) continue;
        const [album, artist, year, genre] = getAlbumForDate(dd);
        const dk  = padKey(dd);
        const cr  = ratingsData[dk];
        const dateStr = dd.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        entries.push({ dateStr, album, artist, year, genre, cr });
    }

    if (entries.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);padding:32px 0;text-align:center;font-size:13px">No previous albums yet.<br>Come back tomorrow!</p>';
        document.getElementById('archive-heading').textContent = 'Previous Albums';
        return;
    }

    document.getElementById('archive-heading').textContent = `Previous Albums  ·  ${entries.length} days`;
    list.innerHTML = entries.map(e => {
        const ratingHtml = e.cr
            ? `<div class="archive-stars" title="${e.cr.avg.toFixed(1)}/5 · ${e.cr.count} ratings">☠${e.cr.avg.toFixed(1)}</div>`
            : '';
        const listenHtml = Object.entries(SERVICES).map(([key, svc]) =>
            `<a class="arch-listen-btn arch-${key}" href="${svc.url(e.album, e.artist)}" target="_blank" rel="noopener">${svc.name}</a>`
        ).join('');
        return `
          <div class="archive-entry">
            <div class="archive-date">${e.dateStr}</div>
            <div class="archive-info">
              <div class="archive-title">${e.album}</div>
              <div class="archive-artist">${e.artist}  ·  ${e.year}</div>
              <div class="archive-genre">${e.genre}</div>
              <div class="archive-listen">${listenHtml}</div>
            </div>
            ${ratingHtml}
          </div>`;
    }).join('');
}

// ══════════════════════════════════════════════════════════════
// RATINGS PANEL
// ══════════════════════════════════════════════════════════════
async function buildRatingsPanel() {
    const list = document.getElementById('ratings-list');
    list.innerHTML = '<p class="ratings-empty">Loading...</p>';
    const ratingsData = await fetchAllRatings(true);
    const uid = getUserId();
    const dates = Object.keys(ratingsData).sort((a, b) => b.localeCompare(a));

    if (dates.length === 0) {
        list.innerHTML = '<p class="ratings-empty">No community ratings yet.<br>Be the first to rate today\'s album!</p>';
        return;
    }

    list.innerHTML = dates.map(dk => {
        const d = ratingsData[dk];
        const parts   = dk.split('-');
        const dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]), 12);
        const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        const skulls  = '☠'.repeat(Math.round(d.avg));
        const dist    = [1,2,3,4,5].map(v => {
            const cnt = d.ratings.filter(r => r.rating === v).length;
            const pct = Math.round((cnt / d.count) * 100);
            return `<div class="dist-bar" title="${v}☠: ${cnt}" style="width:${Math.max(pct,2)}%;background:rgba(200,0,0,${0.25 + v*0.15})"></div>`;
        }).join('');
        const indiv = d.ratings.map(r => {
            const isMe = r.user_id === uid;
            const s = '☠'.repeat(r.rating);
            return `<span class="indiv-rating${isMe ? ' mine' : ''}">${s}${isMe ? '<span class="mine-tag">you</span>' : ''}</span>`;
        }).join('');
        return `
          <div class="rating-entry">
            <div class="re-stars">${skulls}</div>
            <div class="re-info">
              <div class="re-album">${d.album}</div>
              <div class="re-artist">${d.artist}</div>
              <div class="re-meta">${dateStr}  ·  ${d.avg.toFixed(1)}/5 avg  ·  ${d.count} rating${d.count > 1 ? 's' : ''}</div>
              <div class="dist-row">${dist}</div>
              <div class="indiv-row">${indiv}</div>
            </div>
          </div>`;
    }).join('');
}

// ══════════════════════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════════════════════
function switchTab(name) {
    ['today', 'archive', 'ratings'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== name);
        document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
    });
    if (name === 'archive') buildArchivePanel();
    if (name === 'ratings') buildRatingsPanel();
}

// SERVICE SELECTION
// ══════════════════════════════════════════════════════════════
function pickService(serviceKey) {
    localStorage.setItem('dailyalbum_service', serviceKey);
    const [album, artist] = getAlbumForDate(new Date());
    showListenView(serviceKey, album, artist);
    window.open(SERVICES[serviceKey].url(album, artist), '_blank');
}

function showListenView(serviceKey, album, artist) {
    const svc = SERVICES[serviceKey];
    document.getElementById('view-pick').style.display   = 'none';
    document.getElementById('view-listen').style.display = 'block';
    const btn = document.getElementById('listen-link');
    btn.href = svc.url(album, artist);
    btn.className = `listen-btn btn-${serviceKey}`;
    document.getElementById('btn-icon').innerHTML = svc.icon;
    document.getElementById('btn-label').textContent = `Listen on ${svc.name}`;
}

function resetService() {
    localStorage.removeItem('dailyalbum_service');
    document.getElementById('view-listen').style.display = 'none';
    document.getElementById('view-pick').style.display   = 'block';
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
async function init() {
    const today = new Date();
    const [album, artist, year, genre] = getAlbumForDate(today);

    // Header date
    document.getElementById('date-display').textContent = formatDateHeader(today);

    // Album info
    document.getElementById('album-title').textContent  = album;
    document.getElementById('album-artist').textContent = artist;
    document.getElementById('album-genre').textContent  = genre;
    document.getElementById('album-year').textContent   = year;

    // Artwork
    const artUrl = await fetchArtwork(album, artist);
    if (artUrl) {
        const img = document.getElementById('artwork-img');
        img.src = artUrl;
        img.style.display = 'block';
        document.getElementById('artwork-placeholder').style.display = 'none';
    }

    // Service
    const saved = localStorage.getItem('dailyalbum_service');
    if (saved && SERVICES[saved]) {
        showListenView(saved, album, artist);
    } else {
        document.getElementById('view-pick').style.display = 'block';
    }

    // Rating
    const savedRating = getRatingForDate(today);
    if (savedRating) applyStarState(parseInt(savedRating));
    initStarHover();
    loadCommunityRating();
}

init();

// ══════════════════════════════════════════════════════════════
// BLOOD DRIP ANIMATION
// ══════════════════════════════════════════════════════════════
function spawnDrip(containerId) {
    const c = document.getElementById(containerId);
    if (!c) return;
    const NS    = 'http://www.w3.org/2000/svg';
    const cx    = 5 + Math.random() * 90;
    const sw    = 1.5 + Math.random() * 5;
    const maxH  = 18 + Math.random() * 52;
    const dur   = 800 + Math.random() * 2800;
    // Varied blood tones — some bright arterial, some dark
    const b     = Math.floor(Math.random() * 55);
    const color = `rgb(${165 + b},${b > 35 ? 8 : 0},0)`;
    const dark  = `rgb(${60 + b},0,0)`;
    const id    = '_d' + Math.random().toString(36).slice(2);
    const W     = sw * 6 + 14;
    const H     = maxH + sw * 6 + 18;
    const mid   = W / 2;

    const svg = document.createElementNS(NS, 'svg');
    svg.style.cssText = `position:absolute;left:calc(${cx}% - ${mid}px);top:-1px;width:${W}px;height:${H}px;overflow:visible;pointer-events:none;`;
    svg.innerHTML = `
      <defs>
        <radialGradient id="${id}g" cx="38%" cy="32%" r="65%">
          <stop offset="0%"   stop-color="${color}"/>
          <stop offset="52%"  stop-color="${dark}"/>
          <stop offset="100%" stop-color="rgb(35,0,0)" stop-opacity="0.92"/>
        </radialGradient>
      </defs>
      <path id="${id}p" fill="url(#${id}g)"/>
      <ellipse id="${id}hi" rx="0" ry="0" fill="rgba(255,90,90,0.2)"/>
    `;
    c.appendChild(svg);

    const path = document.getElementById(id + 'p');
    const hi   = document.getElementById(id + 'hi');
    const half = sw / 2;
    const t0   = performance.now();

    function frame(now) {
        const p    = Math.min((now - t0) / dur, 1);
        const ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p; // ease-in-out
        const h    = maxH * ease;
        const bP   = Math.max(0, (p - 0.42) / 0.58);  // bulge starts at 42%
        const bR   = half * 0.9 + sw * 1.15 * bP;

        if (h < 1) { requestAnimationFrame(frame); return; }

        const tw = half * 0.88;
        const bw = half * Math.max(0.45, 1 - bP * 0.55);
        let d;
        if (bP > 0.02) {
            const join = Math.max(0, h - bR * 1.05);
            d = [
                `M ${mid - tw} 0`,
                `L ${mid - bw} ${join}`,
                `Q ${mid - bR} ${h - bR * 0.4}  ${mid - bR} ${h}`,
                `Q ${mid - bR} ${h + bR * 1.18} ${mid}      ${h + bR * 1.22}`,
                `Q ${mid + bR} ${h + bR * 1.18} ${mid + bR} ${h}`,
                `Q ${mid + bR} ${h - bR * 0.4}  ${mid + bw} ${join}`,
                `L ${mid + tw} 0`, 'Z'
            ];
            // Glint highlight on upper-left of bulge
            hi.setAttribute('cx',   mid - bR * 0.38);
            hi.setAttribute('cy',   h + bR * 0.08);
            hi.setAttribute('rx',   bR * 0.25);
            hi.setAttribute('ry',   bR * 0.18);
        } else {
            d = [
                `M ${mid - tw} 0`,
                `L ${mid - half * 0.55} ${h}`,
                `Q ${mid} ${h + 2.5} ${mid + half * 0.55} ${h}`,
                `L ${mid + tw} 0`, 'Z'
            ];
        }
        path.setAttribute('d', d.join(' '));

        if (p < 1) { requestAnimationFrame(frame); return; }
        svg.remove();
        spawnDrop(c, cx, maxH, sw, color, dark);
    }
    requestAnimationFrame(frame);
}

function spawnDrop(c, cx, startY, sw, color, dark) {
    const NS  = 'http://www.w3.org/2000/svg';
    const r   = sw * 0.85 + 1.8;
    const id  = '_dp' + Math.random().toString(36).slice(2);
    const svg = document.createElementNS(NS, 'svg');
    const ry  = r * (0.88 + Math.random() * 0.28);
    svg.style.cssText = `position:absolute;left:calc(${cx}% - ${r*3}px);top:${startY - r}px;width:${r*6}px;height:${r*6}px;overflow:visible;pointer-events:none;`;
    svg.innerHTML = `
      <defs>
        <radialGradient id="${id}g" cx="34%" cy="28%" r="66%">
          <stop offset="0%"   stop-color="${color}"/>
          <stop offset="100%" stop-color="${dark}"/>
        </radialGradient>
      </defs>
      <ellipse cx="${r*3}" cy="${ry}" rx="${r}" ry="${ry}" fill="url(#${id}g)"/>
    `;
    c.appendChild(svg);

    const t0   = performance.now();
    const dur  = 220 + Math.random() * 200;
    const dist = 20 + Math.random() * 22;

    function fall(now) {
        const p = Math.min((now - t0) / dur, 1);
        svg.style.transform = `translateY(${dist * p * p}px)`;
        svg.style.opacity   = String(1 - p);
        if (p < 1) requestAnimationFrame(fall); else svg.remove();
    }
    requestAnimationFrame(fall);
}

    for (let i = 0; i < 6; i++) setTimeout(() => spawnDrip('logo-drip-container'), i * 220);
